baseURL: "https://jianshan.co/"
title: "见山笔记"
theme: "hugo-theme-stack"
paginate: 10
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true

# CJK word count
hasCJKLanguage: true

# ==================
# Multilingual
# ==================
languages:
  zh:
    languageName: "中文"
    weight: 1
    contentDir: content/zh
    title: "见山笔记"
    params:
      description: "价值投资、商业分析"
      author:
        name: "沧浪"
      sidebar:
        subtitle: "价值投资，知行合一"
    menu:
      main:
        - identifier: home
          name: "首页"
          url: /
          weight: 10
          params:
            icon: home
        - identifier: valuation
          name: "估值工具"
          url: "https://valux-dcf.streamlit.app/"
          weight: 40
          params:
            icon: chart-line
            newTab: true
      social:
        - identifier: github
          name: "GitHub"
          url: "https://github.com/alanhewenyu"
          params:
            icon: brand-github
        - identifier: email
          name: "Email"
          url: "mailto:alanhe@icloud.com"
          params:
            icon: mail
        - identifier: wechat
          name: "公众号"
          url: "/wechat/"
          params:
            icon: wechat
        - identifier: rss
          name: "RSS"
          url: "index.xml"
          params:
            icon: rss

  en:
    languageName: "English"
    weight: 2
    contentDir: content/en
    title: "Jianshan Notes"
    params:
      description: "Value Investing & Business Analysis"
      author:
        name: "沧浪"
      sidebar:
        subtitle: "Value investing, unity of knowledge and action"
    menu:
      main:
        - identifier: home
          name: "Home"
          url: /en/
          weight: 10
          params:
            icon: home
        - identifier: valuation
          name: "Valuation Tool"
          url: "https://valux-dcf.streamlit.app/"
          weight: 40
          params:
            icon: chart-line
            newTab: true
      social:
        - identifier: github
          name: "GitHub"
          url: "https://github.com/alanhewenyu"
          params:
            icon: brand-github
        - identifier: email
          name: "Email"
          url: "mailto:alanhe@icloud.com"
          params:
            icon: mail
        - identifier: wechat
          name: "公众号"
          url: "/wechat/"
          params:
            icon: wechat
        - identifier: rss
          name: "RSS"
          url: "index.xml"
          params:
            icon: rss

# ==================
# Theme Parameters
# ==================
params:
  mainSections:
    - posts
  featuredImageField: image
  description: "价值投资、商业分析"

  author:
    name: "沧浪"

  dateFormat:
    published: "2006-01-02"
    lastUpdated: "2006-01-02 15:04 MST"

  sidebar:
    compact: false
    emoji: ""
    subtitle: "价值投资，知行合一"

  article:
    headingAnchor: false
    math: false
    toc: true
    readingTime: true
    license:
      enabled: false

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 20
    page:
      - type: toc

  colorScheme:
    toggle: true
    default: auto

  defaultImage:
    opengraph:
      enabled: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    tabWidth: 4

services:
  googleAnalytics:
    ID: "G-XJ2GVQDLG2"

privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: false
  instagram:
    disable: true
  x:
    disable: true
  vimeo:
    disable: true
  youtube:
    disable: true
