baseURL: "https://jianshan.co/"
title: "见山笔记"
theme: "hugo-theme-stack"
paginate: 10
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
hasCJKLanguage: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

# ==================
# Multilingual
# ==================
languages:
  zh:
    languageName: "中文"
    weight: 1
    contentDir: content/zh
    title: "见山笔记"
    params:
      description: "价值投资、商业分析"
      author:
        name: "沧浪"
      sidebar:
        subtitle: "模糊的正确优于精确的错误"
    menu:
      main:
        - identifier: home
          name: "首页"
          url: /
          weight: 10
          params:
            icon: home
      social:
        - identifier: github
          name: GitHub
          url: "https://github.com/alanhewenyu"
          params:
            icon: brand-github
        - identifier: email
          name: Email
          url: "mailto:alanhe@icloud.com"
          params:
            icon: messages
        - identifier: rss
          name: RSS
          url: "index.xml"
          params:
            icon: rss

  en:
    languageName: "English"
    weight: 2
    contentDir: content/en
    title: "Jianshan Notes"
    params:
      description: "Value Investing & Business Analysis"
      author:
        name: "沧浪"
      sidebar:
        subtitle: "Being Roughly Right Is Better Than Being Precisely Wrong"
    menu:
      main:
        - identifier: home
          name: "Home"
          url: /en/
          weight: 10
          params:
            icon: home
      social:
        - identifier: github
          name: GitHub
          url: "https://github.com/alanhewenyu"
          params:
            icon: brand-github
        - identifier: email
          name: Email
          url: "mailto:alanhe@icloud.com"
          params:
            icon: messages
        - identifier: rss
          name: RSS
          url: "index.xml"
          params:
            icon: rss

# ==================
# Theme Parameters
# ==================
params:
  mainSections:
    - posts
  rssFullContent: true
  favicon: ""
  description: "价值投资、商业分析"
  keywords:
    - 价值投资
    - DCF
    - 公司估值
    - 商业分析
    - AI投资

  sidebar:
    emoji: "📊"

  article:
    headingAnchor: true
    math: false
    readingTime: true
    license:
      enabled: false

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 10
    page:
      - type: toc

  colorScheme:
    toggle: true
    default: auto

  comments:
    enabled: false

  footer:
    since: 2024

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
  instagram:
    disable: true
  x:
    disable: true
  vimeo:
    disable: true
  youtube:
    disable: true
