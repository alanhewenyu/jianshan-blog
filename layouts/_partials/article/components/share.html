{{- $title := .Title -}}
{{- $url := .Permalink -}}
{{- $encodedTitle := $title | urlquery -}}
{{- $encodedURL := $url | urlquery -}}

<section class="article-share">
    <h2 class="share-title">{{ T "article.share" | default "Share" }}</h2>
    <div class="share-buttons">
        {{/* Twitter / X */}}
        <a class="share-btn share-twitter"
           href="https://twitter.com/intent/tweet?text={{ $encodedTitle }}&url={{ $encodedURL }}"
           target="_blank" rel="noopener noreferrer" title="Share on X">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>

        {{/* Facebook */}}
        <a class="share-btn share-facebook"
           href="https://www.facebook.com/sharer/sharer.php?u={{ $encodedURL }}"
           target="_blank" rel="noopener noreferrer" title="Share on Facebook">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        </a>

        {{/* LinkedIn */}}
        <a class="share-btn share-linkedin"
           href="https://www.linkedin.com/shareArticle?mini=true&url={{ $encodedURL }}&title={{ $encodedTitle }}"
           target="_blank" rel="noopener noreferrer" title="Share on LinkedIn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>

        {{/* Weibo */}}
        <a class="share-btn share-weibo"
           href="https://service.weibo.com/share/share.php?url={{ $encodedURL }}&title={{ $encodedTitle }}"
           target="_blank" rel="noopener noreferrer" title="Share on Weibo">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10.098 20.323c-3.977.391-7.414-1.406-7.672-4.02-.259-2.609 2.759-5.047 6.74-5.441 3.979-.394 7.413 1.404 7.671 4.018.259 2.6-2.759 5.049-6.739 5.443zM9.05 17.219c-.384.616-1.208.884-1.829.602-.612-.279-.793-.991-.406-1.593.379-.595 1.176-.86 1.799-.576.625.278.816.988.436 1.567zm1.6-1.98c-.151.238-.482.353-.739.253-.253-.096-.335-.387-.188-.618.148-.23.468-.344.727-.249.258.1.346.389.2.614zm.186-3.742c-1.737-.348-3.698.46-4.46 1.813-.776 1.373-.225 2.939 1.285 3.456 1.56.543 3.545-.19 4.33-1.58.776-1.372.244-2.93-1.155-3.689zm7.258-.572c-.277-.079-.47-.133-.324-.479.316-.751.348-1.4.007-1.862-.641-.868-2.394-.821-4.42-.023 0 0-.633.275-.471-.225.31-1.001.263-1.839-.22-2.324-.908-.904-3.395-.134-5.557 1.711C5.455 9.398 4.4 11.152 4.4 12.688c0 2.94 3.775 4.727 7.466 4.727 4.84 0 8.062-2.812 8.062-5.043 0-1.348-1.139-2.112-1.834-2.391zM20.52 5.554c-1.263-1.4-3.122-1.936-4.756-1.574-.44.098-.701.542-.603.981.097.44.541.701.982.603 1.092-.242 2.342.116 3.192 1.059.847.94 1.089 2.217.688 3.27-.151.397.052.837.449.988.396.149.836-.053.988-.449.553-1.453.22-3.217-.94-4.878zM22.206 3.48C20.226 1.292 17.342.46 14.786 1.1c-.533.133-.855.683-.722 1.216.133.532.683.854 1.216.722 1.974-.494 4.21.148 5.744 1.692 1.536 1.544 2.07 3.81 1.469 5.76-.158.525.141 1.08.665 1.238.523.157 1.08-.142 1.237-.665.782-2.541.112-5.486-2.189-7.583z"/></svg>
        </a>

        {{/* Email */}}
        <a class="share-btn share-email"
           href="mailto:?subject={{ $encodedTitle }}&body={{ $encodedURL }}"
           title="Share via Email">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M1.5 8.67v8.58a3 3 0 003 3h15a3 3 0 003-3V8.67l-8.928 5.493a3 3 0 01-3.144 0L1.5 8.67z"/><path d="M22.5 6.908V6.75a3 3 0 00-3-3h-15a3 3 0 00-3 3v.158l9.714 5.978a1.5 1.5 0 001.572 0L22.5 6.908z"/></svg>
        </a>

        {{/* Copy link */}}
        <button class="share-btn share-copy" onclick="copyArticleLink(this)" title="{{ T "article.copyLink" | default "Copy link" }}">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
    </div>
</section>

<script>
function copyArticleLink(btn) {
    navigator.clipboard.writeText(window.location.href).then(function() {
        btn.classList.add('copied');
        var originalTitle = btn.getAttribute('title');
        btn.setAttribute('title', '{{ T "article.linkCopied" | default "Link copied!" }}');
        setTimeout(function() {
            btn.classList.remove('copied');
            btn.setAttribute('title', originalTitle);
        }, 2000);
    });
}
</script>
